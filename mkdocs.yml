  5 分钟读懂核心思想
site_url: https://zhaoyang97.github.io/Paper-Notes/
repo_url: https://github.com/zhaoyang97/Paper-Notes
repo_name: Star on GitHub
docs_dir: docs
site_dir: site
theme:
  name: material
  language: zh
  custom_dir: overrides
  favicon: assets/favicon.svg
  icon:
    logo: material/book-open-variant
  features:
  - navigation.instant
  - navigation.instant.progress
  - navigation.tabs
  - navigation.indexes
  - navigation.top
  - navigation.prune
  - search.suggest
  - search.highlight
  - content.code.copy
  - toc.follow
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: custom
    accent: deep purple
    toggle:
      icon: material/weather-sunny
      name: 切换暗色模式
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: indigo
    accent: deep purple
    toggle:
      icon: material/weather-night
      name: 切换亮色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
