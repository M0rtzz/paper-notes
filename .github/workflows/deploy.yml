name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install mkdocs-material mkdocs-redirects
      - name: Update build_date to today
        run: |
          today=$(date +%Y-%m-%d)
          sed -i "s/build_date: '.*'/build_date: '${today}'/" mkdocs.yml
      - run: mkdocs build --strict
        continue-on-error: true
      - run: mkdocs build
      - name: Optimize search index for mobile
        run: python scripts/trim_search_index.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
